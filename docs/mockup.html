<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #1e40af;
  --primary-light: #3b82f6;
  --primary-bg: #eff6ff;
  --danger: #dc2626;
  --danger-bg: #fef2f2;
  --warning: #f59e0b;
  --warning-bg: #fffbeb;
  --success: #16a34a;
  --success-bg: #f0fdf4;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-300: #d1d5db;
  --gray-400: #9ca3af;
  --gray-500: #6b7280;
  --gray-600: #4b5563;
  --gray-700: #374151;
  --gray-800: #1f2937;
  --gray-900: #111827;
  --sidebar-w: 240px;
  --header-h: 56px;
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px rgba(0,0,0,.05);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',system-ui,sans-serif; background:var(--gray-50); color:var(--gray-800); font-size:14px; line-height:1.5; }
button { font-family:inherit; cursor:pointer; }
input, select, textarea { font-family:inherit; font-size:14px; }

/* Layout */
.app { display:flex; height:100vh; overflow:hidden; }
.sidebar { width:var(--sidebar-w); background:var(--gray-900); color:#fff; display:flex; flex-direction:column; flex-shrink:0; }
.sidebar-logo { padding:16px 20px; font-size:18px; font-weight:700; border-bottom:1px solid var(--gray-700); display:flex; align-items:center; gap:10px; }
.sidebar-logo img { width:28px; height:28px; border-radius:6px; }
.sidebar-nav { flex:1; padding:12px 0; overflow-y:auto; }
.nav-section { padding:8px 20px 4px; font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--gray-400); font-weight:600; }
.nav-item { display:flex; align-items:center; gap:10px; padding:8px 20px; color:var(--gray-300); text-decoration:none; cursor:pointer; transition:.15s; font-size:13px; }
.nav-item:hover { background:rgba(255,255,255,.08); color:#fff; }
.nav-item.active { background:var(--primary); color:#fff; border-radius:0; }
.nav-item i { width:18px; text-align:center; font-size:14px; }
.nav-badge { margin-left:auto; background:var(--danger); color:#fff; font-size:11px; font-weight:600; padding:1px 7px; border-radius:10px; }
.sidebar-user { padding:12px 20px; border-top:1px solid var(--gray-700); display:flex; align-items:center; gap:10px; }
.sidebar-user .avatar { width:32px; height:32px; border-radius:50%; background:var(--primary-light); display:flex; align-items:center; justify-content:center; font-weight:600; font-size:13px; }
.sidebar-user .user-info { flex:1; }
.sidebar-user .user-name { font-size:13px; font-weight:500; }
.sidebar-user .user-role { font-size:11px; color:var(--gray-400); }

.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.header { height:var(--header-h); background:#fff; border-bottom:1px solid var(--gray-200); display:flex; align-items:center; padding:0 24px; gap:16px; flex-shrink:0; }
.header-title { font-size:18px; font-weight:600; }
.header-actions { margin-left:auto; display:flex; align-items:center; gap:12px; }
.content { flex:1; overflow-y:auto; padding:24px; }

/* Cards */
.card { background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); border:1px solid var(--gray-200); }
.card-header { padding:16px 20px; border-bottom:1px solid var(--gray-100); display:flex; align-items:center; justify-content:space-between; }
.card-header h3 { font-size:15px; font-weight:600; }
.card-body { padding:16px 20px; }

/* Buttons */
.btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:6px; font-size:13px; font-weight:500; border:1px solid transparent; transition:.15s; }
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:#1d4ed8; }
.btn-secondary { background:#fff; color:var(--gray-700); border-color:var(--gray-300); }
.btn-secondary:hover { background:var(--gray-50); }
.btn-danger { background:var(--danger); color:#fff; }
.btn-sm { padding:5px 10px; font-size:12px; }
.btn-success { background:var(--success); color:#fff; }
.btn-warning { background:var(--warning); color:#fff; }

/* Stats */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:24px; }
.stat-card { background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); padding:20px; border:1px solid var(--gray-200); border-left:4px solid var(--gray-300); }
.stat-card.red { border-left-color:var(--danger); }
.stat-card.orange { border-left-color:var(--warning); }
.stat-card.green { border-left-color:var(--success); }
.stat-card.blue { border-left-color:var(--primary-light); }
.stat-value { font-size:28px; font-weight:700; }
.stat-label { font-size:12px; color:var(--gray-500); margin-top:2px; }

/* Tables */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; }
th { text-align:left; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.04em; color:var(--gray-500); padding:10px 16px; border-bottom:2px solid var(--gray-200); }
td { padding:12px 16px; border-bottom:1px solid var(--gray-100); font-size:13px; }
tr:hover td { background:var(--gray-50); }
tr.clickable { cursor:pointer; }

/* Badges */
.badge { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
.badge-red { background:var(--danger-bg); color:var(--danger); }
.badge-orange { background:var(--warning-bg); color:#b45309; }
.badge-green { background:var(--success-bg); color:var(--success); }
.badge-blue { background:var(--primary-bg); color:var(--primary); }
.badge-gray { background:var(--gray-100); color:var(--gray-500); }

/* Status dot */
.status-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
.dot-red { background:var(--danger); }
.dot-orange { background:var(--warning); }
.dot-green { background:var(--success); }
.dot-blue { background:var(--primary-light); }
.dot-gray { background:var(--gray-300); }

/* Progress bar */
.progress-bar { background:var(--gray-200); border-radius:6px; height:8px; overflow:hidden; }
.progress-fill { height:100%; border-radius:6px; transition:width .3s; }
.progress-fill.green { background:var(--success); }
.progress-fill.orange { background:var(--warning); }
.progress-fill.red { background:var(--danger); }
.progress-fill.blue { background:var(--primary-light); }

/* Phase stepper */
.phase-stepper { display:flex; align-items:center; gap:0; margin:20px 0; }
.phase-step { flex:1; text-align:center; position:relative; }
.phase-step .step-dot { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 6px; font-weight:600; font-size:13px; border:2px solid var(--gray-300); background:#fff; color:var(--gray-400); }
.phase-step.completed .step-dot { background:var(--success); border-color:var(--success); color:#fff; }
.phase-step.active .step-dot { background:var(--primary); border-color:var(--primary); color:#fff; }
.phase-step.blocked .step-dot { background:var(--danger); border-color:var(--danger); color:#fff; }
.phase-step .step-label { font-size:11px; color:var(--gray-500); }
.phase-step.active .step-label { color:var(--primary); font-weight:600; }
.phase-step::after { content:''; position:absolute; top:16px; left:calc(50% + 20px); right:calc(-50% + 20px); height:2px; background:var(--gray-200); }
.phase-step:last-child::after { display:none; }
.phase-step.completed::after { background:var(--success); }

/* Tabs */
.tabs { display:flex; border-bottom:2px solid var(--gray-200); margin-bottom:20px; }
.tab { padding:10px 20px; font-size:13px; font-weight:500; color:var(--gray-500); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; transition:.15s; }
.tab:hover { color:var(--gray-700); }
.tab.active { color:var(--primary); border-bottom-color:var(--primary); }

/* Forms */
.form-group { margin-bottom:16px; }
.form-label { display:block; font-size:13px; font-weight:500; color:var(--gray-700); margin-bottom:4px; }
.form-input, .form-select { width:100%; padding:8px 12px; border:1px solid var(--gray-300); border-radius:6px; font-size:14px; transition:.15s; }
.form-input:focus, .form-select:focus { outline:none; border-color:var(--primary-light); box-shadow:0 0 0 3px rgba(59,130,246,.15); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }

/* Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:1000; display:flex; align-items:center; justify-content:center; animation:fadeIn .15s; }
.modal { background:#fff; border-radius:12px; box-shadow:var(--shadow-lg); max-width:600px; width:90%; max-height:85vh; overflow-y:auto; }
.modal-header { padding:20px 24px; border-bottom:1px solid var(--gray-200); display:flex; align-items:center; justify-content:space-between; }
.modal-header h2 { font-size:17px; font-weight:600; }
.modal-close { background:none; border:none; font-size:20px; color:var(--gray-400); cursor:pointer; }
.modal-body { padding:20px 24px; }
.modal-footer { padding:16px 24px; border-top:1px solid var(--gray-200); display:flex; justify-content:flex-end; gap:8px; }

/* Checklist */
.checklist { list-style:none; }
.checklist-item { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--gray-100); }
.checklist-item:last-child { border-bottom:none; }
.checklist-item input[type="checkbox"] { width:18px; height:18px; accent-color:var(--primary); cursor:pointer; }
.checklist-item.done label { text-decoration:line-through; color:var(--gray-400); }
.checklist-item label { cursor:pointer; flex:1; }
.checklist-item .meta { font-size:11px; color:var(--gray-400); }

/* Comments */
.comment { display:flex; gap:12px; padding:12px 0; border-bottom:1px solid var(--gray-100); }
.comment:last-child { border-bottom:none; }
.comment .avatar-sm { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:600; font-size:12px; flex-shrink:0; }
.comment .comment-body { flex:1; }
.comment .comment-author { font-weight:600; font-size:13px; }
.comment .comment-time { font-size:11px; color:var(--gray-400); margin-left:8px; }
.comment .comment-text { margin-top:4px; font-size:13px; }
.comment .mention { color:var(--primary); font-weight:500; }

/* Alerts panel */
.alert-row { display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:6px; margin-bottom:8px; cursor:pointer; transition:.15s; }
.alert-row:hover { transform:translateX(4px); }
.alert-row.severity-red { background:var(--danger-bg); border-left:3px solid var(--danger); }
.alert-row.severity-orange { background:var(--warning-bg); border-left:3px solid var(--warning); }
.alert-row.severity-green { background:var(--success-bg); border-left:3px solid var(--success); }
.alert-icon { font-size:18px; width:24px; text-align:center; }
.alert-content { flex:1; }
.alert-partner { font-weight:600; font-size:13px; }
.alert-reason { font-size:12px; color:var(--gray-600); margin-top:2px; }
.alert-meta { text-align:right; }
.alert-owner { font-size:12px; color:var(--gray-500); }
.alert-days { font-size:11px; font-weight:600; }

/* Notification list */
.notif-item { display:flex; align-items:flex-start; gap:12px; padding:12px 16px; border-bottom:1px solid var(--gray-100); cursor:pointer; transition:.15s; }
.notif-item:hover { background:var(--gray-50); }
.notif-item.unread { background:var(--primary-bg); }
.notif-icon { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
.notif-content { flex:1; }
.notif-title { font-size:13px; font-weight:500; }
.notif-desc { font-size:12px; color:var(--gray-500); margin-top:2px; }
.notif-time { font-size:11px; color:var(--gray-400); white-space:nowrap; }

/* Task tree */
.task-tree { }
.task-group { margin-bottom:16px; }
.task-group-header { display:flex; align-items:center; gap:10px; padding:10px 16px; background:var(--gray-50); border-radius:6px; cursor:pointer; font-weight:600; font-size:14px; }
.task-group-header i.caret { transition:transform .2s; }
.task-group-header.open i.caret { transform:rotate(90deg); }
.subtask-list { padding:8px 0 8px 40px; }
.subtask { display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:4px; cursor:pointer; transition:.1s; }
.subtask:hover { background:var(--gray-50); }
.subtask input[type="checkbox"] { width:16px; height:16px; accent-color:var(--primary); }
.subtask .subtask-name { flex:1; font-size:13px; }
.subtask .subtask-assignee { font-size:12px; color:var(--gray-500); }
.subtask .subtask-due { font-size:12px; color:var(--gray-400); }
.subtask.done .subtask-name { text-decoration:line-through; color:var(--gray-400); }
.subtask.blocked { opacity:.6; }

/* Deliverables */
.deliverable { display:flex; align-items:center; gap:10px; padding:10px 12px; border:1px solid var(--gray-200); border-radius:6px; margin-bottom:8px; }
.deliverable i { font-size:16px; }
.deliverable.fulfilled i { color:var(--success); }
.deliverable.missing i { color:var(--warning); }
.deliverable .del-name { flex:1; font-size:13px; }
.deliverable .del-status { font-size:12px; }

/* Partner portal specific */
.portal-header { background:linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%); color:#fff; padding:32px; border-radius:var(--radius); margin-bottom:24px; }
.portal-header h1 { font-size:24px; font-weight:700; }
.portal-header p { opacity:.85; margin-top:4px; }

/* Blurred tasks (Marketing pattern) */
.task-blurred { filter:blur(1.5px) opacity(.5); pointer-events:none; transition:filter .2s; }
.task-blurred:hover { filter:blur(0) opacity(1); pointer-events:auto; }

/* Toast */
.toast { position:fixed; bottom:24px; right:24px; background:var(--gray-800); color:#fff; padding:12px 20px; border-radius:8px; box-shadow:var(--shadow-lg); z-index:2000; display:flex; align-items:center; gap:10px; animation:slideUp .3s; font-size:13px; }
.toast.success { background:#065f46; }
.toast.error { background:var(--danger); }
.toast i { font-size:16px; }

/* Animations */
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }

/* Language toggle */
.lang-toggle { display:flex; border:1px solid var(--gray-300); border-radius:6px; overflow:hidden; }
.lang-btn { padding:4px 10px; font-size:12px; font-weight:500; background:#fff; border:none; cursor:pointer; }
.lang-btn.active { background:var(--primary); color:#fff; }

/* Search */
.search-box { display:flex; align-items:center; background:#fff; border:1px solid var(--gray-300); border-radius:6px; padding:0 10px; }
.search-box i { color:var(--gray-400); font-size:14px; }
.search-box input { border:none; outline:none; padding:7px 8px; font-size:13px; width:200px; }

/* File upload area */
.upload-area { border:2px dashed var(--gray-300); border-radius:8px; padding:32px; text-align:center; color:var(--gray-500); cursor:pointer; transition:.15s; }
.upload-area:hover { border-color:var(--primary-light); background:var(--primary-bg); color:var(--primary); }
.upload-area i { font-size:32px; display:block; margin-bottom:8px; }

/* Template editor */
.template-phase { border:1px solid var(--gray-200); border-radius:8px; margin-bottom:12px; }
.template-phase-header { padding:12px 16px; background:var(--gray-50); border-radius:8px 8px 0 0; font-weight:600; display:flex; align-items:center; justify-content:space-between; cursor:pointer; }
.template-tasks { padding:8px 16px 12px; }
.template-task { display:flex; align-items:center; gap:8px; padding:6px 0; font-size:13px; border-bottom:1px solid var(--gray-100); }
.template-task:last-child { border-bottom:none; }

/* Grid layouts */
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
.grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; }

/* Responsive scroll */
.page { display:none; }
.page.active { display:block; }

/* Role switch bar */
.role-bar { background:var(--warning-bg); border:1px solid #fcd34d; border-radius:6px; padding:8px 16px; margin-bottom:16px; display:flex; align-items:center; gap:12px; font-size:13px; }
.role-bar i { color:#b45309; }
.role-select { padding:4px 8px; border:1px solid #fcd34d; border-radius:4px; font-size:12px; background:#fff; }

/* Tooltip */
[data-tooltip] { position:relative; }
[data-tooltip]:hover::after { content:attr(data-tooltip); position:absolute; bottom:100%; left:50%; transform:translateX(-50%); background:var(--gray-800); color:#fff; padding:4px 8px; border-radius:4px; font-size:11px; white-space:nowrap; z-index:100; }
</style>
</head>

function getStatusBadge(status) {
  const map = {
    blocked: { cls:'badge-red', label:t('blocked'), icon:'fa-lock' },
    overdue: { cls:'badge-red', label:t('overdue'), icon:'fa-clock' },
    at_risk: { cls:'badge-orange', label:t('atRisk'), icon:'fa-triangle-exclamation' },
    on_track: { cls:'badge-green', label:t('onTrack'), icon:'fa-check' },
    completed: { cls:'badge-green', label:t('completed'), icon:'fa-check-circle' },
    active: { cls:'badge-blue', label:t('active'), icon:'fa-play' },
    not_active: { cls:'badge-gray', label:t('notActive'), icon:'fa-minus' },
  };
  const m = map[status] || map['active'];
  return `<span class="badge ${m.cls}"><i class="fa-solid ${m.icon}"></i> ${m.label}</span>`;
}

function getProgressColor(p) { return p >= 70 ? 'green' : p >= 40 ? 'orange' : p < 20 ? 'red' : 'blue'; }

function getUserById(id) { return USERS.find(u => u.id === id); }
function getPartnerById(id) { return PARTNERS.find(p => p.id === id); }

function avatar(user, size) {
  size = size || 32;
  return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${user.color};display:flex;align-items:center;justify-content:center;font-weight:600;font-size:${size*0.4}px;color:#fff;flex-shrink:0">${user.initials}</div>`;
}

function showToast(msg, type) {
  type = type || 'success';
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<i class="fa-solid ${type==='success'?'fa-check-circle':'fa-times-circle'}"></i> ${msg}`;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function renderSidebar() {
  const isPartnerRole = currentUser.role === 'Partner';
  const isBDMorAdmin = ['BDM','Admin'].includes(currentUser.role);

  let navItems;
  if (portalMode || isPartnerRole) {
    navItems = [
      { id:'portal', icon:'fa-house', label:t('partnerPortal') },
    ];
  } else {
    navItems = [
      { id:'dashboard', icon:'fa-gauge-high', label:t('dashboard'), badge: 3 },
      { id:'partners', icon:'fa-building', label:t('partners') },
      { id:'tasks', icon:'fa-list-check', label:t('tasks') },
      { id:'notifications', icon:'fa-bell', label:t('notifications'), badge: NOTIFICATIONS.filter(n=>n.userId===currentUser.id && !n.read).length },
    ];
    if (isBDMorAdmin) navItems.push({ id:'templates', icon:'fa-file-lines', label:t('templates') });
    if (currentUser.role === 'Admin') navItems.push({ id:'admin', icon:'fa-shield-halved', label:t('admin') });
    navItems.push({ id:'settings', icon:'fa-gear', label:t('settings') });
    navItems.push({ sep:true });
    navItems.push({ id:'portal', icon:'fa-external-link', label:t('partnerPortal') });
  }

  let html = '';
  navItems.forEach(item => {
    if (item.sep) { html += '<div style="border-top:1px solid var(--gray-700);margin:8px 0"></div>'; return; }
    html += `<div class="nav-item ${currentPage===item.id?'active':''}" onclick="navigate('${item.id}')">
      <i class="fa-solid ${item.icon}"></i> ${item.label}
      ${item.badge ? `<span class="nav-badge">${item.badge}</span>` : ''}
    </div>`;
  });
  document.getElementById('sidebarNav').innerHTML = html;

  document.getElementById('sidebarUser').innerHTML = `
    ${avatar(currentUser, 32)}
    <div class="user-info">
      <div class="user-name">${currentUser.name}</div>
      <div class="user-role">${currentUser.role}</div>
    </div>`;
}

function renderHeader(title, actions) {
  actions = actions || '';
  let roleSwitch = '';
  if (!portalMode) {
    roleSwitch = `<div class="lang-toggle" style="margin-right:8px">
      <button class="lang-btn ${LANG.current==='nl'?'active':''}" onclick="switchLang('nl')">NL</button>
      <button class="lang-btn ${LANG.current==='en'?'active':''}" onclick="switchLang('en')">EN</button>
    </div>`;
  }
  document.getElementById('headerBar').innerHTML = `
    <h1 class="header-title">${title}</h1>
    <div class="header-actions">
      ${actions}
      ${roleSwitch}
      <div class="search-box"><i class="fa-solid fa-search"></i><input placeholder="${t('search')}" /></div>
    </div>`;
}

function navigate(page, opts) {
  opts = opts || {};
  if (page === 'portal') portalMode = true;
  else portalMode = false;
  currentPage = page;
  selectedPartnerId = opts.partnerId || null;
  selectedTaskId = opts.taskId || null;
  renderSidebar();
  renderPage();
}

function renderPage() {
  const area = document.getElementById('contentArea');
  switch(currentPage) {
    case 'dashboard': renderDashboard(area); break;
    case 'partners': selectedPartnerId ? renderPartnerDetail(area) : renderPartnersList(area); break;
    case 'tasks': selectedTaskId ? renderTaskDetail(area) : renderTasksList(area); break;
    case 'notifications': renderNotifications(area); break;
    case 'templates': renderTemplates(area); break;
    case 'admin': renderAdmin(area); break;
    case 'settings': renderSettings(area); break;
    case 'portal': renderPortal(area); break;
  }
}

function renderDashboard(area) {
  renderHeader(t('dashboard'), `<button class="btn btn-primary" onclick="showNewOnboardingModal()"><i class="fa-solid fa-plus"></i> ${t('newOnboarding')}</button>`);

  const active = PARTNERS.filter(p=>!p.archived);
  const blocked = active.filter(p=>p.status==='blocked').length;
  const overdue = active.filter(p=>p.status==='overdue').length;
  const atRisk = active.filter(p=>p.status==='at_risk').length;
  const onTrack = active.filter(p=>p.status==='on_track').length;

  const myTasks = TASKS.filter(t => t.assigneeId === currentUser.id && t.status !== 'completed' && t.status !== 'not_active' && t.main);
  const myNotifs = NOTIFICATIONS.filter(n => n.userId === currentUser.id && !n.read);

  let alertRows = '';
  const alertPartners = active.filter(p => ['blocked','overdue','at_risk'].includes(p.status))
    .sort((a,b) => {
      const order = {overdue:0,blocked:1,at_risk:2};
      return (order[a.status]||3) - (order[b.status]||3);
    });

  alertPartners.forEach(p => {
    const sevClass = p.status==='overdue'||p.status==='blocked' ? 'severity-red' : 'severity-orange';
    const blockedTask = TASKS.find(t => t.partnerId===p.id && (t.status==='blocked'||t.status==='overdue') && t.main);
    const owner = blockedTask ? getUserById(blockedTask.assigneeId) : null;
    let reason = '';
    if (p.status==='blocked' && blockedTask && blockedTask.blockedBy) {
      const blocker = TASKS.find(t=>t.id===blockedTask.blockedBy);
      reason = `${t('blocked_by')}: ${blocker ? blocker.name : 'onbekend'}`;
    } else if (p.status==='overdue' && blockedTask) {
      const days = Math.ceil((new Date() - new Date(blockedTask.dueDate)) / 86400000);
      reason = `${days} ${t('days_overdue')}`;
    } else if (p.status==='at_risk') {
      reason = 'Deadline nadert, voortgang vertraagd';
    }

    alertRows += `<div class="alert-row ${sevClass}" onclick="navigate('partners',{partnerId:'${p.id}'})">
      <div class="alert-icon"><i class="fa-solid ${p.status==='blocked'?'fa-lock':p.status==='overdue'?'fa-clock':'fa-triangle-exclamation'}" style="color:${p.status==='at_risk'?'var(--warning)':'var(--danger)'}"></i></div>
      <div class="alert-content">
        <div class="alert-partner">${p.company}</div>
        <div class="alert-reason">${reason}${blockedTask ? ' — '+blockedTask.name : ''}</div>
      </div>
      <div class="alert-meta">
        ${owner ? `<div class="alert-owner">${owner.name}</div>` : ''}
        ${getStatusBadge(p.status)}
      </div>
    </div>`;
  });

  let todayHtml = '';
  myTasks.forEach(task => {
    const partner = getPartnerById(task.partnerId);
    todayHtml += `<div class="notif-item" onclick="navigate('tasks',{taskId:'${task.id}'})">
      <div class="notif-icon" style="background:${task.status==='overdue'?'var(--danger-bg)':task.status==='blocked'?'var(--warning-bg)':'var(--primary-bg)'}">
        <i class="fa-solid fa-list-check" style="color:${task.status==='overdue'?'var(--danger)':task.status==='blocked'?'#b45309':'var(--primary)'}"></i>
      </div>
      <div class="notif-content">
        <div class="notif-title">${task.name}</div>
        <div class="notif-desc">${partner.company} — ${t('deadline')}: ${task.dueDate}</div>
      </div>
      <div>${getStatusBadge(task.status)}</div>
    </div>`;
  });

  area.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card red"><div class="stat-value">${blocked+overdue}</div><div class="stat-label">${t('blocked')} / ${t('overdue')}</div></div>
      <div class="stat-card orange"><div class="stat-value">${atRisk}</div><div class="stat-label">${t('atRisk')}</div></div>
      <div class="stat-card green"><div class="stat-value">${onTrack}</div><div class="stat-label">${t('onTrack')}</div></div>
      <div class="stat-card blue"><div class="stat-value">${active.length}</div><div class="stat-label">${t('allPartners')} (actief)</div></div>
    </div>
    <div class="grid-2">
      <div class="card">
        <div class="card-header"><h3><i class="fa-solid fa-triangle-exclamation" style="color:var(--danger);margin-right:6px"></i> ${t('alertsTitle')}</h3></div>
        <div class="card-body">${alertRows || `<div style="text-align:center;padding:20px;color:var(--gray-400)"><i class="fa-solid fa-check-circle" style="font-size:32px;display:block;margin-bottom:8px;color:var(--success)"></i>${t('noAlerts')}</div>`}</div>
      </div>
      <div class="card">
        <div class="card-header"><h3><i class="fa-solid fa-calendar-day" style="color:var(--primary);margin-right:6px"></i> ${t('todayTasks')}</h3></div>
        <div class="card-body" style="padding:0">${todayHtml || '<div style="padding:20px;text-align:center;color:var(--gray-400)">Geen taken voor vandaag</div>'}</div>
      </div>
    </div>`;
}

  const p = getPartnerById(selectedPartnerId);

function switchTaskTab(tab, el) {
  document.querySelectorAll('#taskTabs .tab').forEach(t => t.classList.remove('active'));

  document.getElementById('taskTabContent').style.display = tab === 'my' ? 'block' : 'none';
  document.getElementById('taskTabAll').style.display = tab === 'all' ? 'block' : 'none';
}

  if (subtasks.length) {
    subtasks.forEach(st => {
      const done = st.status === 'completed';
      checklistHtml += `<li class="checklist-item ${done?'done':''}">
        <input type="checkbox" ${done?'checked':''} onclick="completeSubtask('${st.id}')" ${st.status==='blocked'||st.status==='not_active'?'disabled':''}>

  const taskDels = DELIVERABLES.filter(d => d.taskId === task.id);
  let delHtml = '';
  taskDels.forEach(d => {
    const uploader = d.uploadedBy ? getUserById(d.uploadedBy) : null;
    delHtml += `<div class="deliverable ${d.fulfilled?'fulfilled':'missing'}">
      <i class="fa-solid ${d.fulfilled?'fa-circle-check':'fa-circle-exclamation'}"></i>
      <span class="del-name">${d.name}</span>

      ${avatar(author, 32)}

        <button class="btn btn-sm btn-secondary" onclick="navigate('tasks',{taskId:'${blocker.id}'})" style="margin-left:auto">Bekijk blocker</button>

  area.innerHTML = `

          <div class="card-body">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
              <div><span style="font-size:12px;color:var(--gray-500)">Partner</span><div style="font-weight:500">${partner ? partner.company : '-'}</div></div>

        ${taskDels.length ? `<div class="card" style="margin-bottom:20px">

function renderPortal(area) {
  renderHeader(t('partnerPortal'), `<button class="btn btn-secondary" onclick="portalMode=false;navigate('dashboard')"><i class="fa-solid fa-arrow-left"></i> Terug naar interne app</button>`);

  const portalPartner = currentUser.partnerId ? getPartnerById(currentUser.partnerId) : PARTNERS.find(p=>p.id==='p1');
  if (!portalPartner) { area.innerHTML = '<p>Geen partner gekoppeld</p>'; return; }

  const phases = PHASE_NAMES();
  let phaseHtml = '';
  phases.forEach((name, i) => {
    const idx = i + 1;
    let cls = idx < portalPartner.phase ? 'completed' : idx === portalPartner.phase ? 'active' : '';
    phaseHtml += `<div class="phase-step ${cls}">
      <div class="step-dot">${idx}</div>
      <div class="step-label">${name}</div>
    </div>`;
  });

  const partnerTasks = TASKS.filter(tk => tk.partnerId === portalPartner.id && tk.assigneeRole === 'Partner' && tk.main);
  let actionHtml = '';
  partnerTasks.forEach(task => {
    const taskDels = DELIVERABLES.filter(d => d.taskId === task.id);
    let delHtml = '';
    taskDels.forEach(d => {
      delHtml += `<div class="deliverable ${d.fulfilled?'fulfilled':'missing'}" style="margin-top:8px">
        <i class="fa-solid ${d.fulfilled?'fa-circle-check':'fa-circle-exclamation'}"></i>
        <span class="del-name">${d.name}</span>
        ${!d.fulfilled ? `<button class="btn btn-sm btn-primary" onclick="simulateUpload('${d.id}')"><i class="fa-solid fa-upload"></i> Upload</button>` : '<span class="badge badge-green">Geüpload</span>'}
      </div>`;
    });

    actionHtml += `<div style="padding:16px;border:1px solid var(--gray-200);border-radius:8px;margin-bottom:12px">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div><strong>${task.name}</strong></div>
        ${getStatusBadge(task.status)}
      </div>
      <div style="font-size:12px;color:var(--gray-500);margin-top:4px">${t('deadline')}: ${task.dueDate}</div>
      ${delHtml}
    </div>`;
  });

  const partnerComments = COMMENTS.filter(c => {
    const partnerUsers = USERS.filter(u=>u.partnerId===portalPartner.id).map(u=>u.id);
    return c.mentions.some(m => partnerUsers.includes(m)) || partnerUsers.includes(c.authorId);
  });

  let commentHtml = '';
  partnerComments.forEach(c => {
    const author = getUserById(c.authorId);
    const isInternal = !author.partnerId;
    if (isInternal) {
      let text = c.text.replace(/@(\w+ \w+)/g, '<span class="mention">@$1</span>');
      text = text.replace(/Kun je een update.*verlopen\./g, '[intern bericht - niet zichtbaar]');
      commentHtml += `<div class="comment">
        ${avatar(author, 32)}
        <div class="comment-body">
          <span class="comment-author">${author.name} (SPOQ)</span><span class="comment-time">${c.time}</span>
          <div class="comment-text">${text}</div>
        </div>
      </div>`;
    }
  });

  area.innerHTML = `
    <div class="portal-header">
      <h1>${t('welcomePortal')}</h1>
      <p>${portalPartner.company} — ${t('portalDesc')}</p>
    </div>

    <div class="grid-2">
      <div>
        <div class="card" style="margin-bottom:20px">
          <div class="card-header"><h3><i class="fa-solid fa-chart-line" style="margin-right:6px"></i> ${t('yourProgress')}</h3></div>
          <div class="card-body">
            <div class="phase-stepper">${phaseHtml}</div>
            <div style="display:flex;align-items:center;gap:8px;margin-top:16px">
              <div class="progress-bar" style="flex:1"><div class="progress-fill ${getProgressColor(portalPartner.progress)}" style="width:${portalPartner.progress}%"></div></div>
              <span style="font-size:13px;font-weight:600">${portalPartner.progress}%</span>
            </div>
            <div style="margin-top:12px;font-size:12px;color:var(--gray-500)">
              <i class="fa-solid fa-calendar"></i> ${t('goLiveDate')}: <strong>${portalPartner.goLive}</strong>
            </div>
          </div>
        </div>

        ${commentHtml ? `<div class="card">
          <div class="card-header"><h3><i class="fa-solid fa-comments" style="margin-right:6px"></i> Berichten</h3></div>
          <div class="card-body">
            ${commentHtml}
            <div style="margin-top:12px">
              <textarea class="form-input" rows="2" placeholder="Reageer..."></textarea>
              <button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="showToast('Reactie geplaatst','success')"><i class="fa-solid fa-paper-plane"></i> Verstuur</button>
            </div>
          </div>
        </div>` : ''}
      </div>

      <div>
        <div class="card">
          <div class="card-header"><h3><i class="fa-solid fa-clipboard-list" style="margin-right:6px"></i> ${t('yourActions')}</h3></div>
          <div class="card-body">
            ${actionHtml || '<div style="text-align:center;color:var(--gray-400);padding:20px"><i class="fa-solid fa-check-circle" style="font-size:32px;display:block;margin-bottom:8px;color:var(--success)"></i>Geen openstaande actiepunten</div>'}
          </div>
        </div>
      </div>
    </div>`;
}

function showModal(title, bodyHtml, footerHtml) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `<div class="modal">
    <div class="modal-header"><h2>${title}</h2><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">&times;</button></div>
    <div class="modal-body">${bodyHtml}</div>
    ${footerHtml ? `<div class="modal-footer">${footerHtml}</div>` : ''}
  </div>`;
  document.body.appendChild(overlay);
}

    <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">${t('cancel')}</button>
    <button class="btn btn-primary" onclick="addUser()">${t('create')}</button>`;
  showModal(t('addUser'), body, footer);
}

// =====================================================
// ACTIONS
// =====================================================

function createOnboarding() {
  const company = document.getElementById('newCompany').value || 'Nieuw Bedrijf BV';
  const contact = document.getElementById('newContact').value || 'Contact Persoon';
  const email = document.getElementById('newEmail').value || 'contact@bedrijf.nl';
  const country = document.getElementById('newCountry').value;
  const goLive = document.getElementById('newGoLive').value;
  const intType = document.getElementById('newIntType').value || 'Forms ERP';
  const conType = document.getElementById('newConType').value || 'Expert-Partner';

  const newId = 'p' + (PARTNERS.length + 1);
  PARTNERS.push({
    id: newId, company, contact, email, country,
    intType, conType, goLive,
    status: 'on_track', phase: 1, progress: 0, archived: false
  });

  document.querySelector('.modal-overlay')?.remove();
  showToast(`Onboarding aangemaakt voor ${company}! Taken gegenereerd vanuit template.`, 'success');
  navigate('partners', { partnerId: newId });
}

function invitePartner(partnerId) {
  document.querySelector('.modal-overlay')?.remove();
  showToast(`Uitnodiging verstuurd! Partner ontvangt inloggegevens via Outlook e-mail.`, 'success');
}

function completeTask(taskId) {
  const task = TASKS.find(t => t.id === taskId);
  if (!task || task.status === 'blocked' || task.status === 'not_active') {
    showToast('Taak kan niet worden afgerond (geblokkeerd of niet actief)', 'error');
    return;
  }
  task.status = 'completed';
  task.completedAt = new Date().toISOString().slice(0,10);

  TASKS.filter(t => t.blockedBy === taskId).forEach(t => {
    t.status = 'active';
    showToast(`Volgende taak geactiveerd: ${t.name}`, 'success');
  });

  const partner = getPartnerById(task.partnerId);
  if (partner) {
    const total = TASKS.filter(t => t.partnerId === partner.id && t.main).length;
    const done = TASKS.filter(t => t.partnerId === partner.id && t.main && t.status === 'completed').length;
    partner.progress = Math.round((done / total) * 100);
    if (partner.progress === 100) { partner.status = 'completed'; partner.archived = true; }
    else if (partner.status === 'blocked' || partner.status === 'overdue') {
      const hasBlocked = TASKS.some(t => t.partnerId === partner.id && t.main && (t.status === 'blocked' || t.status === 'overdue'));
      if (!hasBlocked) partner.status = 'on_track';
    }
  }

  showToast(t('taskCompleted'), 'success');
  renderPage();
}

function completeSubtask(stId) {
  const st = TASKS.find(t => t.id === stId);
  if (!st) return;
  if (st.status === 'completed') {
    st.status = 'active';
    st.completedAt = null;
  } else {
    st.status = 'completed';
    st.completedAt = new Date().toISOString().slice(0,10);
  }
  showToast(st.status === 'completed' ? 'Subtaak afgerond' : 'Subtaak heropend', 'success');
  renderPage();
}

function simulateUpload(delId) {
  const del = DELIVERABLES.find(d => d.id === delId);
  if (!del) return;
  del.fulfilled = true;
  del.uploadedBy = currentUser.id;
  del.uploadedAt = new Date().toISOString().slice(0,10);

  const task = TASKS.find(t => t.id === del.taskId);
  if (task) {
    const allDels = DELIVERABLES.filter(d => d.taskId === task.id);
    if (allDels.every(d => d.fulfilled)) {
      TASKS.filter(t => t.blockedBy === task.id).forEach(t => {
        t.status = 'active';
        showToast(`Downstream taak ontgrendeld: ${t.name}`, 'success');
      });
    }
  }

  showToast(t('fileUploaded') + ' Downstream taken worden gecontroleerd.', 'success');
  renderPage();
}

function simulateUploadGeneric(taskId) {
  showToast(t('fileUploaded'), 'success');
}

function adjustDeadline(taskId) {
  const newDate = document.getElementById('newDeadline').value;
  const task = TASKS.find(t => t.id === taskId);
  if (task && newDate) {
    task.dueDate = newDate;
    document.querySelector('.modal-overlay')?.remove();
    showToast(`Deadline aangepast naar ${newDate}`, 'success');
    renderPage();
  }
}

function reassignTask(taskId) {
  const newAssigneeId = document.getElementById('newAssignee').value;
  const task = TASKS.find(t => t.id === taskId);
  if (task && newAssigneeId) {
    task.assigneeId = newAssigneeId;
    const user = getUserById(newAssigneeId);
    task.assigneeRole = user.role;
    document.querySelector('.modal-overlay')?.remove();
    showToast(`Taak hertoegewezen aan ${user.name}`, 'success');
    renderPage();
  }
}

function addComment(taskId) {
  const text = document.getElementById('newComment')?.value;
  if (!text) return;
  COMMENTS.push({
    id: 'c' + (COMMENTS.length + 1),
    taskId,
    authorId: currentUser.id,
    text,
    time: new Date().toISOString().slice(0,16).replace('T',' '),
    mentions: []
  });
  showToast('Reactie geplaatst', 'success');
  renderPage();
}

function readNotification(nId) {
  const n = NOTIFICATIONS.find(x => x.id === nId);
  if (n) {
    n.read = true;
    if (n.taskId) navigate('tasks', { taskId: n.taskId });
    else renderPage();
  }
}

function markAllRead() {
  NOTIFICATIONS.filter(n => n.userId === currentUser.id).forEach(n => n.read = true);
  showToast('Alle meldingen als gelezen gemarkeerd', 'success');
  renderSidebar();
  renderPage();
}

function toggleUserActive(userId) {
  const user = USERS.find(u => u.id === userId);
  if (user) {
    user.active = !user.active;
    showToast(`${user.name} is nu ${user.active ? 'actief' : 'gedeactiveerd'}`, 'success');
    renderPage();
  }
}

function addUser() {
  const name = document.getElementById('newUserName').value || 'Nieuwe Gebruiker';
  const email = document.getElementById('newUserEmail').value || 'nieuw@spoq.nl';
  const role = document.getElementById('newUserRole').value;
  const locale = document.getElementById('newUserLocale').value;
  const initials = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const colors = ['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981','#6366f1','#14b8a6','#f97316'];

  USERS.push({
    id: 'u' + (USERS.length + 1), name, role, initials,
    color: colors[Math.floor(Math.random()*colors.length)],
    email, locale, active: true
  });
  document.querySelector('.modal-overlay')?.remove();
  showToast(`Gebruiker ${name} aangemaakt met rol ${role}`, 'success');
  renderPage();
}

function switchLang(lang) {
  LANG.current = lang;
  renderSidebar();
  renderPage();
}

function switchUser(userId) {
  const user = USERS.find(u => u.id === userId);
  if (user) {
    currentUser = user;
    portalMode = user.role === 'Partner';
    currentPage = user.role === 'Partner' ? 'portal' : 'dashboard';
    selectedPartnerId = null;
    selectedTaskId = null;
    renderSidebar();
    renderPage();
    showToast(`Bekijkt als: ${user.name} (${user.role})`, 'success');
  }
}

// =====================================================
// INIT
// =====================================================

renderSidebar();
renderPage();
</script>
</body>
